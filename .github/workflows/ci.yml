name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: harness
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

      # The perf suite shouldn't rot — make sure it still compiles.
      - name: Compile benchmarks
        run: cargo bench --no-run --locked

  wrapper:
    name: npm wrapper syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Zero runtime deps — just syntax-check the wrapper and install scripts so
      # a typo can't ship to npm and break `npm install` for everyone.
      - name: Check wrapper scripts
        run: node --check bin/buildwithnexus.js && for f in scripts/*.js; do node --check "$f"; done

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Advisory DB scan of the harness lockfile. New advisories in unchanged
      # deps shouldn't block unrelated PRs — on PRs the report is informational;
      # on main pushes it fails the build.
      - name: Audit dependencies
        working-directory: harness
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: cargo audit

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          # Use the official rhysd/actionlint binary directly — the
          # raven-actions wrapper has a broken @actions/tool-cache import
          # (No "exports" main defined).
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.4
          ./actionlint -version

      - name: Run actionlint
        run: ./actionlint -color
