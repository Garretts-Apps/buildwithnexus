name: release

# Build the native harness for every supported platform and attach the binaries
# to the GitHub Release. The npm wrapper's first run downloads these.
# publish.yml chains off this workflow's completion to push to npm.
#
# Fully automatic releases: every push to main runs the `gate` job, which
# releases only when package.json's version has no v<version> tag yet. So
# merging a PR that bumps the version ships everything — binaries, GitHub
# release, crates.io, then npm via the chained publish — with zero clicks,
# while docs-only merges do nothing. Tag pushes and manual dispatches always
# release. (The tag this workflow creates is made with GITHUB_TOKEN, which
# never triggers workflows — no recursion.)
on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # for build provenance attestation
  attestations: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - name: Release only unreleased versions on main pushes
        id: check
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" == refs/tags/* || "$EVENT" == workflow_dispatch ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          V=$(node -p "require('./package.json').version")
          if git ls-remote --exit-code --tags origin "refs/tags/v${V}" >/dev/null 2>&1; then
            echo "v${V} is already tagged — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v${V} is not tagged yet — releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Linux aarch64 (runs on x86_64 runner).
      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: harness
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset + checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          ext=""; [[ "$TARGET" == *windows* ]] && ext=".exe"
          src="target/$TARGET/release/buildwithnexus${ext}"
          [[ ! -f "$src" ]] && src="harness/target/$TARGET/release/buildwithnexus${ext}"
          asset="buildwithnexus-$TARGET${ext}"
          cp "$src" "$asset"
          if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256";
          else shasum -a 256 "$asset" > "$asset.sha256"; fi

      # The release tag is the pushed v* tag; on workflow_dispatch it is derived
      # from package.json so it always matches the version npm will publish.
      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            v=$(node -p "require('./package.json').version")
            echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          fi

      # Pull the matching version section out of CHANGELOG.md for the release
      # body. Falls back to a generic line if the section is missing so the
      # release step never fails on a docs gap.
      - name: Extract release notes
        id: notes
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          version="${TAG#v}"
          out="RELEASE_NOTES.md"
          # Print lines from the matching "## [version]" header up to the next
          # top-level "## " header (exclusive).
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## / {grab=0}
            grab {print}
          ' CHANGELOG.md > "$out"
          if [ ! -s "$out" ]; then
            echo "Release $TAG. See CHANGELOG.md for details." > "$out"
          fi
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: buildwithnexus-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

      # Creates the tag + release on workflow_dispatch; on a tag push it just
      # attaches assets to the existing release. The CHANGELOG section becomes
      # the release body, with GitHub's auto-generated commit/PR notes appended.
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          append_body: true
          generate_release_notes: true
          files: buildwithnexus-${{ matrix.target }}*

  # crates.io publishing lives HERE, not in publish.yml: crates.io Trusted
  # Publishing refuses OIDC tokens for workflow_run-triggered jobs, and
  # publish.yml chains off this workflow via workflow_run — so its crates step
  # could never authenticate without a stored token. This workflow's triggers
  # (v* tag push, workflow_dispatch) are both accepted. Requires a Trusted
  # Publishing entry on BOTH crates pointing at workflow file `release.yml`.
  # Idempotent: versions already on the registry index are skipped, so
  # re-dispatching a release is safe.
  crates:
    needs: [gate, build]
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Get crates.io token via OIDC
        id: cratesio
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio.outputs.token }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::no crates.io OIDC token — add a Trusted Publishing entry for workflow release.yml on both crates. Skipping."
            exit 0
          fi
          set -e
          V=$(node -p "require('./package.json').version")
          # `cargo info <name>` resolves workspace members LOCALLY, so from
          # inside this repo it always says our crates exist — ask the
          # registry's sparse index instead.
          on_registry() {
            local n=$1 p
            case ${#n} in
              1) p="1/$n" ;;
              2) p="2/$n" ;;
              3) p="3/${n:0:1}/$n" ;;
              *) p="${n:0:2}/${n:2:2}/$n" ;;
            esac
            curl -sf "https://index.crates.io/$p" | grep -q "\"vers\":\"$V\""
          }
          if on_registry buildwithnexus; then
            echo "buildwithnexus ${V} already on crates.io — skipping."
          else
            cargo publish -p buildwithnexus --locked
          fi
          if on_registry bwn; then
            echo "bwn ${V} already on crates.io — done."
            exit 0
          fi
          # bwn depends on the crate above; wait out index propagation.
          for i in 1 2 3 4 5; do
            if cargo publish -p bwn --locked; then exit 0; fi
            echo "bwn publish attempt ${i} failed (index propagation?) — retrying in 30s"
            sleep 30
          done
          echo "::warning::bwn alias crate did not publish — re-run this workflow or dispatch 'Publish to npm' manually."
