name: release

# Build the native harness for every supported platform and attach the binaries
# to the GitHub Release. The npm postinstall downloads these as its fast path.
# publish.yml chains off this workflow's completion to push to npm.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # for build provenance attestation
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Linux aarch64 (runs on x86_64 runner).
      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: harness
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset + checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          ext=""; [[ "$TARGET" == *windows* ]] && ext=".exe"
          src="harness/target/$TARGET/release/buildwithnexus${ext}"
          asset="buildwithnexus-$TARGET${ext}"
          cp "$src" "$asset"
          if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256";
          else shasum -a 256 "$asset" > "$asset.sha256"; fi

      # The release tag is the pushed v* tag; on workflow_dispatch it is derived
      # from package.json so it always matches the version npm will publish.
      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            v=$(node -p "require('./package.json').version")
            echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: buildwithnexus-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

      # Creates the tag + release on workflow_dispatch; on a tag push it just
      # attaches assets to the existing release.
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: buildwithnexus-${{ matrix.target }}*
