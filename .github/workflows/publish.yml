name: Publish to npm

# The published package is a thin, zero-dependency, script-free wrapper: the
# FIRST RUN fetches the SHA-256-verified prebuilt binary for the user's
# platform from the GitHub Release (no npm install scripts — keeps
# supply-chain scanners green). So publishing is just `npm publish` of the
# wrapper — no bundle step.
#
# Sequencing: publishing is chained off the `release` workflow's COMPLETION, not
# the raw `v*` tag. release.yml builds and attaches the per-platform binaries on
# the tag; only once that whole workflow succeeds do we publish to npm — so a
# user never installs a version whose binaries aren't up yet (the first-run
# fast path). workflow_dispatch stays for manual/emergency publishes.
on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version_bump:
        # Default 'none': publish the version already on main, whose release
        # binaries exist. A bump here can't push a tag (OIDC-only, no PAT), so
        # release.yml never builds binaries for the bumped version — leaving
        # the first-run download with a 404. Bump via a PR to main instead.
        description: "Version bump — keep 'none' to publish the current version (recommended)"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate: a successful `release` run — from a v* tag push, an automatic
    # main-push release (version-gated in release.yml), or a manual run — or a
    # direct manual dispatch of this workflow. A failed release never
    # publishes; a version-gated release that skipped chains into a run that
    # self-skips on its own already-published checks.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           (startsWith(github.event.workflow_run.head_branch, 'v') ||
            github.event.workflow_run.head_branch == 'main' ||
            github.event.workflow_run.event == 'workflow_dispatch')) }}
    permissions:
      contents: write
      id-token: write   # REQUIRED for OIDC-based npm Trusted Publisher

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # On the release-triggered path, publish exactly the tagged commit the
          # binaries were built from; on manual dispatch, the current branch.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # Auth is OIDC Trusted Publisher (no npm token, no PAT). Checkout only
          # needs read access to this public repo, so the default GITHUB_TOKEN is
          # enough — do NOT require a secret here, or an unset secret makes
          # checkout fail with "could not read Username" before publish runs.
          persist-credentials: true
          submodules: false

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          # Note: registry-url *intentionally omitted* — when a Trusted Publisher
          # is configured for this package on npmjs.com, npm publish auto-detects
          # the OIDC context from GitHub Actions and uses it for auth. Setting
          # registry-url + .npmrc with NODE_AUTH_TOKEN fights that flow.

      # Node 22 ships npm 10.x, which has no OIDC Trusted Publishing support, so
      # `npm publish` falls back to token auth, finds none, and fails ENEEDAUTH.
      # OIDC trusted publishing requires npm >= 11.5.1 — install it explicitly.
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Bump version + tag
        # Only the manual path bumps; the release-triggered path publishes the
        # already-tagged version as-is.
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_bump != 'none' }}
        run: |
          set -e
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          if [ "$BUMP" = "none" ]; then
            echo "Skipping bump (workflow_dispatch with none)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # No package-lock.json in the wrapper — only package.json changes.
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version)
          echo "New version: $NEW_VERSION"
          git add package.json
          git commit -m "chore(release): $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          if ! git push origin HEAD:main --follow-tags; then
            echo "::warning::Could not push bump+tag to main. Publishing to npm anyway."
          fi

      # Guard the launch path: a syntax error in the wrapper or bootstrap
      # would break `npm install` for every user. Cheap to check, expensive to miss.
      - name: Syntax-check wrapper scripts
        run: node --check bin/buildwithnexus.js && for f in scripts/*.js; do node --check "$f"; done

      # Confirm the published file set resolves (bin/, scripts, harness sources)
      # without actually publishing.
      - name: Verify package contents
        run: npm pack --dry-run

      # Idempotency: npm versions are immutable, so republishing one that already
      # exists hard-fails. The release→publish chain can legitimately re-run for a
      # version that's already live (e.g. a manual publish happened first), so
      # skip the publish instead of failing the run.
      - name: Check if this version is already on npm
        id: published
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "buildwithnexus@$V" version >/dev/null 2>&1; then
            echo "buildwithnexus@$V is already on npm — skipping publish."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      # Platform binary packages (buildwithnexus-<os>-<cpu>): download each
      # release asset, verify its SHA-256 against the published checksum, and
      # publish it as its own package. The main package selects the right one
      # at install time via optionalDependencies — so the main tarball needs
      # no install scripts and no network code at all.
      #
      # FIRST-TIME SETUP: each platform package needs its own npm Trusted
      # Publisher entry (same repo/workflow) at
      #   https://www.npmjs.com/package/buildwithnexus-<platform>/access
      # A brand-new package can't use OIDC before it exists — publish each
      # once manually (npm publish --access public from npm/<platform>) or
      # create them via a granular token, then add the trusted publishers.
      # Runs on every invocation (not gated on the main-package check) and
      # skips versions that already exist — so tokens can be added later and
      # the workflow simply re-run to fill in whatever is missing.
      - name: Publish platform binary packages
        env:
          # One-time bootstrap only: npm OIDC cannot CREATE a package, so the
          # five platform packages' first publish uses this granular token
          # (created in the npmjs.com UI, pasted as a repo secret). After the
          # first release: attach Trusted Publishers to each package and
          # DELETE this secret — later versions publish via OIDC.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          V=$(node -p "require('./package.json').version")
          declare -A T=(
            [linux-x64]=x86_64-unknown-linux-gnu
            [linux-arm64]=aarch64-unknown-linux-gnu
            [darwin-x64]=x86_64-apple-darwin
            [darwin-arm64]=aarch64-apple-darwin
            [win32-x64]=x86_64-pc-windows-msvc
          )
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${V}"
          for p in "${!T[@]}"; do
            t=${T[$p]}; ext=""; [[ "$t" == *windows* ]] && ext=".exe"
            if npm view "buildwithnexus-${p}@${V}" version >/dev/null 2>&1; then
              echo "buildwithnexus-${p}@${V} already published — skipping."
              continue
            fi
            mkdir -p "npm/${p}/bin"
            curl -fsSL -o "npm/${p}/bin/buildwithnexus${ext}" "${BASE}/buildwithnexus-${t}${ext}"
            curl -fsSL -o /tmp/expected.sha256 "${BASE}/buildwithnexus-${t}${ext}.sha256"
            expected=$(cut -d' ' -f1 /tmp/expected.sha256)
            got=$(sha256sum "npm/${p}/bin/buildwithnexus${ext}" | cut -d' ' -f1)
            [[ "$expected" == "$got" ]] || { echo "::error::checksum mismatch for ${p}"; exit 1; }
            chmod +x "npm/${p}/bin/buildwithnexus${ext}"
            node -e "const fs=require('fs'),f='npm/${p}/package.json',j=require('./'+f);j.version='${V}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
            # OIDC first; bootstrap-token fallback for the first publish of
            # a brand-new package (see env comment above).
            if ! (cd "npm/${p}" && npm publish --access public --provenance); then
              if [ -n "${NPM_TOKEN}" ]; then
                echo "OIDC publish failed for buildwithnexus-${p} — using the one-time bootstrap token"
                (cd "npm/${p}" && npm publish --access public --provenance \
                  --//registry.npmjs.org/:_authToken="${NPM_TOKEN}") \
                  || echo "::warning::bootstrap-token publish of buildwithnexus-${p} also failed"
              else
                echo "OIDC publish of buildwithnexus-${p} failed and no NPM_TOKEN bootstrap secret is set — skipping."
                echo "- \`buildwithnexus-${p}@${V}\` not published (no NPM_TOKEN; expected until the one-time bootstrap)" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          done
          # Installs stay safe even if platform packages are missing: the
          # launcher falls back to a checksum-verified first-run download
          # from the GitHub release. Surface what's missing, loudly.
          for p in "${!T[@]}"; do
            if ! npm view "buildwithnexus-${p}@${V}" version >/dev/null 2>&1; then
              echo "buildwithnexus-${p}@${V} is not on the registry — installs use the first-run download fallback until it is published."
              echo "- \`buildwithnexus-${p}@${V}\` missing from the registry — installs fall back to the first-run download (add NPM_TOKEN and re-run to fill in)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          # Pin the main package's optionalDependencies to this exact version.
          node -e "const fs=require('fs'),j=require('./package.json');for(const k of Object.keys(j.optionalDependencies||{}))j.optionalDependencies[k]='${V}';fs.writeFileSync('package.json',JSON.stringify(j,null,2)+'\n')"

      # === AUTH ===
      # The publish step uses npm's OIDC Trusted Publisher flow. It expects:
      #   1. Trusted Publisher configured on npmjs.com for the
      #      buildwithnexus package, scoped to:
      #        - Org: Garretts-Apps
      #        - Repo: buildwithnexus
      #        - Workflow: publish.yml
      #        - Environment: (blank)
      #   2. id-token: write permission on this job (set above).
      #
      # No NPM_TOKEN is read. Token-based auth (and its 2FA gate) is bypassed.
      #
      # Configure here:
      #   https://www.npmjs.com/package/buildwithnexus/access → Trusted Publishers
      - name: Publish to npm (OIDC Trusted Publisher + provenance)
        if: steps.published.outputs.already == 'false'
        run: npm publish --access public --provenance

      # crates.io: `cargo install buildwithnexus` (both binaries) and
      # `cargo install bwn` (alias crate). OIDC only — the auth action
      # exchanges this job's OIDC token for a 30-minute crates.io token.
      # Like npm, crates.io Trusted Publishing must be configured per crate
      # (crates.io → crate → Settings → Trusted Publishing: this repo,
      # publish.yml) and the FIRST publish of each crate is a one-time
      # `cargo publish` from a maintainer machine (cargo login).
      # Not gated on the npm check: crates.io can be published later (add the
      # token or configure Trusted Publishing, then re-run this workflow) —
      # the step skips crate versions that already exist.
      - name: Install Rust for crates.io publish
        if: github.event_name == 'workflow_dispatch'
        uses: dtolnay/rust-toolchain@stable

      - name: Get crates.io token via OIDC
        if: github.event_name == 'workflow_dispatch'
        id: cratesio
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: github.event_name == 'workflow_dispatch'
        env:
          # OIDC token when Trusted Publishing is configured; otherwise the
          # one-time bootstrap token secret (crates.io UI → API Tokens) used
          # to create the crates. Delete the secret after attaching Trusted
          # Publishing to both crates.
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::no crates.io OIDC token and no CARGO_REGISTRY_TOKEN bootstrap secret — skipping crates.io publish."
            exit 0
          fi
          set -e
          V=$(node -p "require('./package.json').version")
          # `cargo info <name>` resolves workspace members LOCALLY, so from
          # inside this repo it always says our crates exist — ask the
          # registry's sparse index instead.
          on_registry() {
            local n=$1 p
            case ${#n} in
              1) p="1/$n" ;;
              2) p="2/$n" ;;
              3) p="3/${n:0:1}/$n" ;;
              *) p="${n:0:2}/${n:2:2}/$n" ;;
            esac
            curl -sf "https://index.crates.io/$p" | grep -q "\"vers\":\"$V\""
          }
          if on_registry buildwithnexus; then
            echo "buildwithnexus ${V} already on crates.io — skipping."
          else
            cargo publish -p buildwithnexus --locked
          fi
          if on_registry bwn; then
            echo "bwn ${V} already on crates.io — done."
            exit 0
          fi
          # bwn depends on the crate above; wait out index propagation.
          for i in 1 2 3 4 5; do
            if cargo publish -p bwn --locked; then exit 0; fi
            echo "bwn publish attempt ${i} failed (index propagation?) — retrying in 30s"
            sleep 30
          done
          echo "::warning::bwn alias crate did not publish — run 'cargo publish -p bwn' manually."

      - name: Summary
        if: always()
        run: |
          PKG_VERSION=$(node -e 'console.log(require("./package.json").version)')
          {
            echo "### Publish"
            echo ""
            echo "- Version: \`$PKG_VERSION\`"
            echo "- Auth: OIDC Trusted Publisher"
            echo "- Provenance: signed via OIDC"
          } >> "$GITHUB_STEP_SUMMARY"
