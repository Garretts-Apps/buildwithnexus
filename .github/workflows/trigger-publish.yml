name: Trigger publish (bridge)

# Bridge workflow: when `.publish-trigger` lands on main, fire a
# workflow_dispatch on `Publish to npm` with patch bump. This exists
# because the publish workflow needs workflow_dispatch (so the bump
# step runs) and the GitHub MCP toolset I have can push files but
# can't directly fire workflow_dispatch.
#
# To kick a publish:
#   1. Update `.publish-trigger` (any change content)
#   2. Commit + push to main
#   3. This workflow runs and dispatches publish.yml
#
# Inputs are read from `.publish-trigger` if it contains a single line
# of the form `bump=patch nexus_ref=main`; otherwise defaults below.

on:
  push:
    branches: [main]
    paths:
      - .publish-trigger

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Parse trigger inputs
        id: parse
        run: |
          BUMP=patch
          REF=main
          if [ -f .publish-trigger ]; then
            line=$(grep -E '^(bump|nexus_ref)=' .publish-trigger | head -2 || true)
            for kv in $line; do
              k="${kv%%=*}"
              v="${kv#*=}"
              case "$k" in
                bump) BUMP="$v" ;;
                nexus_ref) REF="$v" ;;
              esac
            done
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "nexus_ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Dispatching publish.yml with bump=$BUMP nexus_ref=$REF"

      - name: Dispatch publish workflow
        uses: actions/github-script@v9.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yml',
              ref: 'main',
              inputs: {
                version_bump: '${{ steps.parse.outputs.bump }}',
                nexus_ref: '${{ steps.parse.outputs.nexus_ref }}'
              }
            });
