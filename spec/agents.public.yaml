# NEXUS Agent Roster — Public Specification (Metadata)
#
# This file is published as a public, auditable proof that the 56-agent
# organization claimed in the buildwithnexus README is real, not marketing.
#
# What's here:
#   - name + title (the role's "person" — first name + job title)
#   - model: which Claude / OpenAI tier the role uses (opus/sonnet/haiku/o3)
#   - layer: executive | management | senior | implementation | quality | consultant
#   - org: engineering | salesforce | product | security | analytics | etc.
#   - specialty (when set): frontend / backend / salesforce_<area> / etc.
#   - description: what the role owns (one paragraph)
#   - tools: which tools the role can invoke
#   - spawns_sdk: whether the role runs in an isolated Claude Agent SDK session
#
# What's intentionally NOT here:
#   - system_prompt: the role's full behavioral prompt is intellectual property
#     of the NEXUS engine and stays in the private source. The metadata above
#     is the architectural truth; the prompts are the implementation.
#
# Counts (verified against the canonical config/agents.yaml in nexus):
#   - Layer:   10 executive, 10 management, 12 senior, 15 implementation,
#              6 quality, 3 consultant = 56
#   - Model:   15 opus, 37 sonnet, 3 haiku, 1 o3 = 56
#   - Org:     25 engineering, 10 salesforce, 5 product, 4 security,
#              3 ai_team, 3 analytics, 2 documentation, 2 executive,
#              1 finance, 1 revenue = 56
#
# Tools doctrine: executive + management agents are typically read-only
# (Read/Grep/Glob) so they cannot directly modify code — they review, decide,
# and delegate. Implementation + tester agents have read+write+execute access.
# spawns_sdk=true means the agent runs in an isolated Claude Code subprocess;
# spawns_sdk=false means it operates inside the LangGraph orchestration loop.
#
# Source of truth: Garretts-Apps/nexus (private repo).
# License: MIT, published as part of buildwithnexus for transparency.

